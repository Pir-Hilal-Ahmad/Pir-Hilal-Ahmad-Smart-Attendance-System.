<!DOCTYPE html>
<html>
<head>
<title>Update Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:linear-gradient(-45deg,#667eea,#764ba2,#ff6a00,#ee0979);
background-size:400% 400%;
animation:bg 10s infinite;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.form-box{
max-width:600px;
margin:auto;
margin-top:40px;
padding:20px;
background:rgba(255,255,255,0.1);
border-radius:20px;
backdrop-filter:blur(20px);
}
</style>
</head>

<body>

<div class="form-box">

<h3 class="text-center mb-3">✏️ Update Profile</h3>

<form method="POST" enctype="multipart/form-data">

<!-- NAME -->
<input type="text" name="name" class="form-control mb-2"
placeholder="Name" value="{{ student[1] if student else '' }}">

<!-- REG NO -->
<input type="text" name="reg_no" class="form-control mb-2"
placeholder="Registration Number">

<!-- DEPARTMENT -->
<select name="department" class="form-control mb-2" id="department">
<option value="">Select Department</option>
<option>Computer Science</option>
<option>Information Technology</option>
<option>Electronics</option>
<option>Mechanical</option>
</select>

<!-- SEMESTER -->
<select name="semester" class="form-control mb-2" id="semester">
<option value="">Select Semester</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
</select>

<!-- SUBJECTS -->
<label>Select Subjects</label>
<div id="subjects_box" class="mb-2">Select department & semester</div>

<!-- PHONE -->
<input type="text" name="phone" class="form-control mb-2"
placeholder="Phone">

<!-- EMAIL -->
<input type="email" name="email" class="form-control mb-2"
placeholder="Email">

<!-- PHOTO -->
<input type="file" name="photo" class="form-control mb-2">

<!-- USERNAME -->
<input type="text" name="username" class="form-control mb-2"
placeholder="Username">

<!-- PASSWORD -->
<input type="password" name="password" class="form-control mb-2"
placeholder="Password">

<button class="btn btn-warning w-100">Submit for Approval</button>

</form>
<a href="/" class="btn btn-outline-light mt-2 w-100">⬅ Back to Home</a>

</div>

<script>

// 🔥 LOAD SUBJECTS DYNAMICALLY
function loadSubjects(){
    let dept = document.getElementById("department").value;
    let sem = document.getElementById("semester").value;

    if(!dept || !sem) return;

    fetch(`/get_subjects?department=${dept}&semester=${sem}`)
    .then(res => res.json())
    .then(data => {
        let box = document.getElementById("subjects_box");
        box.innerHTML = "";

        if(data.length === 0){
            box.innerHTML = "<p>No subjects found</p>";
            return;
        }

        data.forEach(sub => {
            box.innerHTML += `
            <div class="form-check">
                <input class="form-check-input" type="checkbox" name="subjects" value="${sub}">
                <label class="form-check-label">${sub}</label>
            </div>`;
        });
    });
}

// triggers
document.getElementById("department").onchange = loadSubjects;
document.getElementById("semester").onchange = loadSubjects;

</script>

</body>
</html>
