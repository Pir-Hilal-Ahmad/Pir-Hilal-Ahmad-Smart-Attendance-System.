<!DOCTYPE html>
<html>
<head>
<title>{{ role | capitalize }} Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* Animated Background */
body {
    background: linear-gradient(-45deg, #1f1c2c, #928dab, #ff6a00, #ee0979);
    background-size: 400% 400%;
    animation: bg 10s ease infinite;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

@keyframes bg {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Glass Card */
.card {
    padding: 30px;
    border-radius: 20px;
    width: 350px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(20px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1;}
}

/* Inputs */
.form-control {
    border-radius: 10px;
    border: none;
    transition: 0.3s;
}

.form-control:focus {
    transform: scale(1.03);
    box-shadow: 0 0 10px rgba(255,255,255,0.4);
}

/* Button */
.btn-primary {
    background: linear-gradient(to right, #00c6ff, #0072ff);
    border: none;
    border-radius: 10px;
}

</style>

</head>

<body>

<div class="card text-center">

<h3 class="mb-3">🔐 {{ role | capitalize }} Login</h3>

<form method="post" action="">

<input name="username" class="form-control mb-2" placeholder="Username" required>

<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

<a href="/forgot" class="text-light">Forgot Password?</a>

<button class="btn btn-primary w-100">Login</button>

</form>

<a href="/" class="btn btn-outline-light mt-2 w-100">⬅ Back to Home</a>

</div>

</body>
</html>
